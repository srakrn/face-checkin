version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Face Check-in — Docker Compose
#
# Profiles:
#   sqlite   (default) — Django + cloudflared, SQLite on a persistent volume
#   postgres           — Django + cloudflared + PostgreSQL
#   local              — Django only (no tunnel, for local development)
#
# Usage:
#   docker compose --profile sqlite up
#   docker compose --profile postgres up
#   docker compose --profile local up  # For local development
#
# Cloudflare Setup:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/install-and-setup/tunnel-guide/
#   2. Create a tunnel: cloudflared tunnel create <name>
#   3. Add a domain or use the quick tunnel method
#   4. Set TUNNEL_TOKEN in .env file
# ─────────────────────────────────────────────────────────────────────────────

x-django-common: &django-common
  build: .
  env_file: .env
  depends_on: []
  restart: unless-stopped
  volumes:
    - media_data:/app/media

services:
  # ── Django (SQLite profile) ────────────────────────────────────────────────
  django_sqlite:
    <<: *django-common
    profiles: [sqlite, local]
    environment:
      DATABASE_URL: "sqlite:////data/db.sqlite3"
    volumes:
      - media_data:/app/media
      - sqlite_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Django (PostgreSQL profile) ────────────────────────────────────────────
  django_postgres:
    <<: *django-common
    profiles: [postgres]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-face}:${POSTGRES_PASSWORD:-face}@db:5432/${POSTGRES_DB:-face_checkin}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    profiles: [postgres]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-face}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-face}
      POSTGRES_DB: ${POSTGRES_DB:-face_checkin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-face}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Scheduler (SQLite profile) ──────────────────────────────────────────────
  scheduler_sqlite:
    <<: *django-common
    profiles: [sqlite, local]
    environment:
      DATABASE_URL: "sqlite:////data/db.sqlite3"
      SCHEDULE_INTERVAL: "60"
    volumes:
      - media_data:/app/media
      - sqlite_data:/data
    command: ["/app/scheduler.sh"]
    depends_on:
      django_sqlite:
        condition: service_started

  # ── Scheduler (PostgreSQL profile) ────────────────────────────────────────
  scheduler_postgres:
    <<: *django-common
    profiles: [postgres]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-face}:${POSTGRES_PASSWORD:-face}@db:5432/${POSTGRES_DB:-face_checkin}"
      SCHEDULE_INTERVAL: "60"
    command: ["/app/scheduler.sh"]
    depends_on:
      db:
        condition: service_healthy
      django_postgres:
        condition: service_started

  # ── cloudflared tunnel (SQLite profile) ───────────────────────────────────
  cloudflared_sqlite:
    image: cloudflare/cloudflared:latest
    profiles: [sqlite]
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - django_sqlite

  # ── cloudflared tunnel (PostgreSQL profile) ───────────────────────────────
  cloudflared_postgres:
    image: cloudflare/cloudflared:latest
    profiles: [postgres]
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - django_postgres

volumes:
  sqlite_data:
  postgres_data:
  media_data:
