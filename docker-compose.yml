# ─────────────────────────────────────────────────────────────────────────────
# Face Check-in — Docker Compose
#
# Profiles:
#   sqlite   — Django + cloudflared + scheduler, SQLite on a persistent volume
#   postgres — Django + cloudflared + scheduler + PostgreSQL
#   local    — Django + scheduler only (no tunnel, for local development)
#
# Usage:
#   docker compose --profile sqlite up
#   docker compose --profile postgres up
#   docker compose --profile local up  # For local development
#
# DATABASE_URL is read from .env.  Set it to match your chosen profile:
#   sqlite:   DATABASE_URL=sqlite:///data/db.sqlite3
#   postgres: DATABASE_URL=postgresql://face:face@db:5432/face_checkin
#
# The entrypoint waits for PostgreSQL to be ready before running migrations,
# so no depends_on condition on `db` is required for the django service.
#
# Cloudflare Setup:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/install-and-setup/tunnel-guide/
#   2. Create a tunnel: cloudflared tunnel create <name>
#   3. Add a domain or use the quick tunnel method
#   4. Set TUNNEL_TOKEN in .env file
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Django ─────────────────────────────────────────────────────────────────
  # Serves all profiles. DATABASE_URL from .env selects the database backend.
  # The entrypoint handles SQLite directory creation and PostgreSQL readiness
  # (waits for the DB to accept connections before running migrations).
  django:
    build: .
    env_file: .env
    profiles: [sqlite, local, postgres]
    restart: unless-stopped
    volumes:
      - media_data:/app/media
      - sqlite_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    profiles: [postgres]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-face}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-face}
      POSTGRES_DB: ${POSTGRES_DB:-face_checkin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-face}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Scheduler ─────────────────────────────────────────────────────────────
  # Runs auto_open_sessions and auto_close_sessions every SCHEDULE_INTERVAL seconds.
  # DATABASE_URL is read from .env — set it to match your chosen profile.
  scheduler:
    build: .
    env_file: .env
    profiles: [sqlite, local, postgres]
    restart: unless-stopped
    environment:
      SCHEDULE_INTERVAL: "60"
    volumes:
      - media_data:/app/media
      - sqlite_data:/data
    command: ["/app/scheduler.sh"]
    depends_on:
      django:
        condition: service_started

  # ── cloudflared tunnel ────────────────────────────────────────────────────
  # Connects to Django via the service name `django` on the Docker network.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: [sqlite, postgres]
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - django

volumes:
  sqlite_data:
  postgres_data:
  media_data:
