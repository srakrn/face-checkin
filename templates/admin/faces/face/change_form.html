{% extends "admin/change_form.html" %}
{% load i18n static %}

{% block extrahead %}
  {{ block.super }}
  {# Expose the face-api models URL to the JS widget #}
  <script>
    window.FACE_API_MODELS_URL = "{% static 'js/face-api/models' %}";
  </script>
  <script>
    (function () {
      var s = document.createElement("script");
      s.src = "{% static 'js/face-api/face-api.min.js' %}";
      s.onerror = function () { /* face-api.js not available — embedding extraction skipped */ };
      document.head.appendChild(s);
    })();
  </script>
  {# Webcam capture widget #}
  <script src="{% static 'js/webcam_capture.js' %}"></script>
{% endblock %}

{% block after_field_sets %}
  <input type="hidden" name="face_embedding_json" id="id_face_embedding_json">
  {{ block.super }}
{% endblock %}
