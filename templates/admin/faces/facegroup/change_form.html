{% extends "admin/change_form.html" %}
{% load i18n static %}

{% block extrahead %}
  {{ block.super }}
  {# Expose the face-api models URL to the JS widget #}
  <script>
    window.FACE_API_MODELS_URL = "{% static 'js/face-api/models' %}";
  </script>
  <script>
    (function () {
      var s = document.createElement("script");
      s.src = "{% static 'js/face-api/face-api.min.js' %}";
      s.onerror = function () { /* face-api.js not available — embedding extraction skipped */ };
      document.head.appendChild(s);
    })();
  </script>
  {# Shared face-api utilities (must load before widget scripts) #}
  <script src="{% static 'js/face-api-utils.js' %}"></script>
  {# Bulk webcam capture widget for inline Face rows #}
  <script src="{% static 'js/bulk_webcam_capture.js' %}"></script>
{% endblock %}
